name: CI/CD OpenShift

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login harbor.kakor.ovh -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build image
        run: docker build -t harbor.kakor.ovh/ipim2il/groupe-3/tp-app:latest .

      - name: Push image
        run: docker push harbor.kakor.ovh/ipim2il/groupe-3/tp-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install oc
        run: |
          curl -LO https://mirror.openshift.com/pub/openshift-v4/clients/oc/latest/linux/oc.tar.gz
          tar -xvf oc.tar.gz
          sudo mv oc /usr/local/bin/

      - name: Login OpenShift
        run: |
          oc login ${{ secrets.OPENSHIFT_SERVER }} --token=${{ secrets.OPENSHIFT_TOKEN }} --insecure-skip-tls-verify

      - name: Deploy
        run: |
          oc apply -f k8s/
