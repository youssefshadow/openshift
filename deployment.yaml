apiVersion: apps/v1
kind: Deployment
metadata:
  name: tp-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tp-app
  template:
    metadata:
      labels:
        app: tp-app
    spec:
      containers:
        - name: tp-app
          image: harbor.kakor.ovh/USERNAME/tp-app:latest
          ports:
            - containerPort: 5000
